<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Gestão de Tarefas</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Sistema de Gestão de Tarefas</h1>
        <p>Organize atividades, acompanhe prioridades e prazos.</p>
      </header>

      <section class="painel-formulario">
        <h2>Nova tarefa</h2>
        <div class="form-grid">
          <input type="text" id="titulo" placeholder="Digite a tarefa" />

          <select id="prioridade">
            <option value="Baixa">Prioridade Baixa</option>
            <option value="Média">Prioridade Média</option>
            <option value="Alta">Prioridade Alta</option>
          </select>

          <input type="date" id="prazo" />
          <button id="btnAdicionar">Adicionar tarefa</button>
        </div>
      </section>

      <section class="painel-resumo">
        <div class="card-resumo">
          <span>Total</span>
          <strong id="totalTarefas">0</strong>
        </div>
        <div class="card-resumo">
          <span>Pendentes</span>
          <strong id="tarefasPendentes">0</strong>
        </div>
        <div class="card-resumo">
          <span>Concluídas</span>
          <strong id="tarefasConcluidas">0</strong>
        </div>
      </section>

      <section class="painel-filtros">
        <input type="text" id="busca" placeholder="Buscar tarefa..." />

        <select id="filtroStatus">
          <option value="todas">Todas</option>
          <option value="pendentes">Pendentes</option>
          <option value="concluidas">Concluídas</option>
        </select>

        <select id="filtroPrioridade">
          <option value="todas">Todas as prioridades</option>
          <option value="Alta">Alta</option>
          <option value="Média">Média</option>
          <option value="Baixa">Baixa</option>
        </select>
      </section>

      <section>
        <ul id="listaTarefas" class="lista-tarefas"></ul>
        <p id="mensagemVazia" class="mensagem-vazia">
          Nenhuma tarefa cadastrada.
        </p>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
